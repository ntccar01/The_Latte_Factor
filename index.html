<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>吃錢怪獸抓抓樂 - 拿鐵因子大作戰</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Microsoft JhengHei', sans-serif; }
        body { 
            background-color: #1a1a2e; color: #fff; display: flex; flex-direction: column; 
            align-items: center; height: 100vh; overflow: hidden; touch-action: manipulation;
        }
        #game-container {
            width: 100%; max-width: 480px; height: 100%; position: relative;
            background: linear-gradient(to bottom, #16213e, #0f3460);
            display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        /* UI 面板 */
        #top-bar {
            display: flex; justify-content: space-between; padding: 15px 20px;
            background: rgba(0, 0, 0, 0.4); z-index: 10; font-size: 1.2rem; font-weight: bold;
        }
        #wallet-display { color: #4cd137; font-size: 1.5rem; transition: color 0.3s; }
        .danger { color: #e84118 !important; }
        
        /* 遊戲區域 */
        #play-area { flex-grow: 1; position: relative; overflow: hidden; }
        #bottom-zone {
            position: absolute; bottom: 0; width: 100%; height: 60px;
            background: rgba(232, 65, 24, 0.2); border-top: 2px dashed #e84118;
            display: flex; justify-content: center; align-items: center; color: rgba(255,255,255,0.5);
        }

        /* 怪獸與動畫 */
        .monster {
            position: absolute; font-size: 2.5rem; cursor: pointer; user-select: none;
            display: flex; flex-direction: column; align-items: center; z-index: 5;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
        }
        .monster-label {
            font-size: 0.7rem; background: rgba(0,0,0,0.7); padding: 2px 6px; 
            border-radius: 10px; margin-top: -5px; white-space: nowrap;
        }
        @keyframes fall {
            from { top: -50px; }
            to { top: calc(100% - 40px); }
        }
        @keyframes float-up {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }
        .damage-text {
            position: absolute; color: #e84118; font-weight: bold; font-size: 1.5rem;
            animation: float-up 1s forwards; z-index: 20; pointer-events: none;
        }
        
        /* 畫面紅光警告 */
        #damage-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(232, 65, 24, 0.4); opacity: 0; pointer-events: none; z-index: 15;
            transition: opacity 0.1s;
        }

        /* 彈出視窗 (開始/結束) */
        .modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px; z-index: 30; text-align: center;
        }
        .hidden { display: none !important; }
        .modal h1 { margin-bottom: 10px; color: #fbc531; font-size: 2rem;}
        .modal p { margin-bottom: 20px; font-size: 1.1rem; line-height: 1.6; }
        .highlight { color: #e84118; font-weight: bold; font-size: 1.3rem;}
        .btn {
            background: #fbc531; color: #2f3640; border: none; padding: 12px 30px;
            font-size: 1.2rem; font-weight: bold; border-radius: 25px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(251, 197, 49, 0.4); transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }

        /* 頁尾版權 */
        #footer {
            position: absolute; bottom: 5px; width: 100%; text-align: center;
            font-size: 0.75rem; color: rgba(255,255,255,0.4); z-index: 40; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="top-bar">
        <div>⏳ <span id="time-display">30</span> 秒</div>
        <div id="wallet-display">💰 $<span id="money-display">10000</span></div>
    </div>

    <div id="play-area">
        <div id="bottom-zone">錢包防守線</div>
        <div id="damage-flash"></div>
    </div>

    <div id="footer">設計：國立臺東專科學校 汽車科 林慶泓 老師 & Gemini</div>

    <div id="start-screen" class="modal">
        <h1>吃錢怪獸抓抓樂</h1>
        <p>你這個月有 <strong>$10,000</strong> 的資金。<br>天空會不斷掉下誘惑你的「拿鐵因子」，<br>在它們掉進錢包前，<br><strong>快速點擊消滅它們！</strong></p>
        <button class="btn" onclick="startGame()">開始防守</button>
    </div>

    <div id="end-screen" class="modal hidden">
        <h1 id="end-title">遊戲結束</h1>
        <p>你這個月剩下：<br><span id="final-money" style="font-size: 2rem; color: #4cd137;">$0</span></p>
        <p>你總共漏接了 <span id="miss-count" class="highlight">0</span> 隻怪獸<br>被吃掉了 <strong>$<span id="total-loss">0</span></strong></p>
        <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <p style="margin: 0; font-size: 0.9rem;">⚠️ 震撼教育 ⚠️<br>如果每個月都這樣花，一年下來你將損失：<br><span id="annual-loss" class="highlight" style="font-size: 1.8rem;">$0</span></p>
        </div>
        <button class="btn" onclick="location.reload()">再挑戰一次</button>
    </div>
</div>

<script>
    const INITIAL_MONEY = 10000;
    const GAME_TIME = 30;
    let money = INITIAL_MONEY;
    let timeLeft = GAME_TIME;
    let missCount = 0;
    let totalLoss = 0;
    
    let gameInterval;
    let spawnInterval;
    let isPlaying = false;

    // 8種吃錢怪獸設定
    const monsterTypes = [
        { emoji: '🥤', name: '手搖飲', cost: 70, speedStr: '3s' },
        { emoji: '🧸', name: '夾娃娃', cost: 100, speedStr: '3.5s' },
        { emoji: '🚕', name: '計程車', cost: 150, speedStr: '2.5s' },
        { emoji: '🍔', name: '宵夜', cost: 200, speedStr: '3.5s' },
        { emoji: '📦', name: '湊免運', cost: 200, speedStr: '3s' },
        { emoji: '🎮', name: '微課金', cost: 300, speedStr: '2.5s' },
        { emoji: '👜', name: '買包包', cost: 300, speedStr: '2.5s' },
        { emoji: '🔩', name: '改裝品', cost: 500, speedStr: '2s' }
    ];

    const playArea = document.getElementById('play-area');
    const moneyDisplay = document.getElementById('money-display');
    const timeDisplay = document.getElementById('time-display');
    const walletDisplay = document.getElementById('wallet-display');
    const damageFlash = document.getElementById('damage-flash');

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        isPlaying = true;
        money = INITIAL_MONEY;
        timeLeft = GAME_TIME;
        missCount = 0;
        totalLoss = 0;
        updateUI();

        // 倒數計時
        gameInterval = setInterval(() => {
            timeLeft--;
            timeDisplay.innerText = timeLeft;
            if (timeLeft <= 0) endGame(false);
        }, 1000);

        // 不斷產生怪獸 (每 400 毫秒產生一隻，製造緊迫感)
        spawnInterval = setInterval(spawnMonster, 400);
    }

    function spawnMonster() {
        if (!isPlaying) return;

        const type = monsterTypes[Math.floor(Math.random() * monsterTypes.length)];
        const monster = document.createElement('div');
        monster.className = 'monster';
        
        // 隨機X軸位置 (預留邊界避免超出螢幕)
        const posX = Math.random() * (playArea.offsetWidth - 60);
        monster.style.left = `${posX}px`;
        monster.style.animation = `fall ${type.speedStr} linear forwards`;
        
        monster.innerHTML = `
            <div>${type.emoji}</div>
            <div class="monster-label">${type.name}</div>
        `;

        // 點擊/觸控消滅怪獸
        monster.addEventListener('mousedown', (e) => killMonster(e, monster));
        monster.addEventListener('touchstart', (e) => killMonster(e, monster));

        // 動畫結束代表掉落到底部 (漏接)
        monster.addEventListener('animationend', () => {
            if (!isPlaying) return;
            takeDamage(type.cost, posX);
            monster.remove();
        });

        playArea.appendChild(monster);
    }

    function killMonster(e, element) {
        e.preventDefault(); // 防止穿透點擊
        if (!isPlaying) return;
        element.remove();
    }

    function takeDamage(cost, posX) {
        money -= cost;
        totalLoss += cost;
        missCount++;
        if (money < 0) money = 0;
        updateUI();

        // 閃紅光
        damageFlash.style.opacity = '1';
        setTimeout(() => { damageFlash.style.opacity = '0'; }, 150);

        // 顯示扣錢浮動文字
        const damageText = document.createElement('div');
        damageText.className = 'damage-text';
        damageText.innerText = `-$${cost}`;
        damageText.style.left = `${posX + 10}px`;
        damageText.style.bottom = `50px`;
        playArea.appendChild(damageText);
        
        setTimeout(() => damageText.remove(), 1000);

        // 檢查破產
        if (money <= 0) {
            endGame(true);
        }
    }

    function updateUI() {
        moneyDisplay.innerText = money.toLocaleString();
        if (money < INITIAL_MONEY * 0.3) {
            walletDisplay.classList.add('danger');
        } else {
            walletDisplay.classList.remove('danger');
        }
    }

    function endGame(isBankrupt) {
        isPlaying = false;
        clearInterval(gameInterval);
        clearInterval(spawnInterval);
        
        // 清除畫面上所有怪獸
        document.querySelectorAll('.monster').forEach(m => m.remove());

        const endScreen = document.getElementById('end-screen');
        endScreen.classList.remove('hidden');

        document.getElementById('end-title').innerText = isBankrupt ? "💸 宣告破產！" : "⏱️ 時間到！";
        document.getElementById('final-money').innerText = `$${money.toLocaleString()}`;
        document.getElementById('final-money').style.color = isBankrupt ? "#e84118" : "#4cd137";
        
        document.getElementById('miss-count').innerText = missCount;
        document.getElementById('total-loss').innerText = totalLoss.toLocaleString();
        
        // 年度損失計算 (震撼教育)
        const annualLoss = totalLoss * 12;
        document.getElementById('annual-loss').innerText = `$${annualLoss.toLocaleString()}`;
    }
</script>
</body>
</html>
